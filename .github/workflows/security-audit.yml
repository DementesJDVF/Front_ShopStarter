name: Auditoría de Seguridad y Calidad

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  security_audit:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: './Front-ShopStarter/package-lock.json'

    - name: Frontend Security Audit
      working-directory: ./Front-ShopStarter
      run: npm audit

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'
        cache-dependency-path: './shop_starter/requirements.txt'

    - name: Backend Security Audit
      working-directory: ./shop_starter
      run: |
        pip install safety
        safety check -r requirements.txt
